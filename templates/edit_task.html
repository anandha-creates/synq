<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Edit Task</title>

    <link rel="stylesheet"
    href="{{ url_for('static',
    filename='css/dashboard.css') }}">

</head>

<body>

<div class="edit-page">

    <form method="POST"
    class="edit-form">

        <h1>Edit Task</h1>

        <input type="text"
        name="title"
        value="{{ task.title }}"
        required>

        <textarea name="description"
        required>{{ task.description }}</textarea>

        <select name="status">

            <option value="To Do"
            {% if task.status == "To Do" %}
            selected
            {% endif %}>
            To Do
            </option>

            <option value="In Progress"
            {% if task.status == "In Progress" %}
            selected
            {% endif %}>
            In Progress
            </option>

            <option value="Completed"
            {% if task.status == "Completed" %}
            selected
            {% endif %}>
            Completed
            </option>

        </select>



        <select name="priority">

            <option value="Low"
            {% if task.priority == "Low" %}
            selected
            {% endif %}>
            Low
            </option>

            <option value="Medium"
            {% if task.priority == "Medium" %}
            selected
            {% endif %}>
            Medium
            </option>

            <option value="High"
            {% if task.priority == "High" %}
            selected
            {% endif %}>
            High
            </option>

        </select>



        <input type="date"
        name="due_date"
        value="{{ task.due_date }}"
        required>



        <button type="submit">

            Update Task

        </button>

    </form>

</div>

</body>

</html>
